## Generation Trigger / 生成触发条件

M09 应在以下情形优先介入：

- 当前需要产生一个尚不存在的内容候选
- 输入只有方向、约束、目标，但还没有成形输出
- 需要形成草案以供评估、综合或验证
- 同一目标存在多种表达可能，需要候选探索
- 已有材料不足以直接交付，但足以支持候选构造

若目标不是"生成新内容"，而是：
- 查找已有内容 → 应优先考虑 M10
- 使用外部能力完成动作 → 应优先考虑 M11
- 确认结果真伪或满足条件 → 应优先考虑 M12
- 创造新的能力组织形式 → 应优先考虑 M13

---
## Generation Modes / 生成模式

> **执行主体**：以下所有模式均由被派遣的独立 Agent 实例执行。元部门仅在微型任务（单一明确操作、无需核验、文件≤1、变更≤10行）时可内联执行。具体委派阈值见 Runtime Binding 节。

### 1. Single-Candidate Generation / 单候选生成

适用于：
- 目标明确
- 表达路径基本稳定
- 只需形成一个初稿或候选结果

### 2. Multi-Candidate Generation / 多候选生成

适用于：
- 存在多个可行方向
- 需要后续评估或比较
- 创意、命名、结构表达存在明显分支空间

该模式下，M09 不负责选定最终优胜者，而只负责生成候选集合。

### 3. Scaffolded Generation / 支架式生成

适用于：
- 已有部分材料、模板、片段或约束
- 需要在现有框架内补全或细化
- 输出需保持与输入高度一致

### 4. Exploratory Generation / 探索式生成

适用于：
- 输入方向明确但实现形式未定
- 需要发掘潜在表达路径
- 允许适度发散，但仍受边界约束

### 5. Minimal Completion Generation / 最小补全生成

适用于：
- 输入接近可用，但局部缺失阻碍流转
- 需要生成最小必要内容以使其进入后续评估/验证/综合
- 补全部分必须显式可识别，不应伪装为既有事实

---
## Input Contract / 输入契约

M09 的输入通常包括：
- 一个明确或半明确的目标
- 输出约束、风格、格式或边界要求
- 可选的参考材料、上下文、已有片段
- 明确的"需要新生成内容"信号

若输入实际上是在请求已有信息，应回流 M10；
若输入是在请求动作执行，应回流 M11；
若输入是在请求真值确认，应回流 M12。
M09 不应在原始任务类型不清时默认扩展为"反正我先生成一点"。

---
## Output Contract / 输出契约

M09 的输出必须尽量包含以下特征：

### 1. Candidate Status / 候选身份

输出应被视为候选内容，而非自动等同于最终结论。

### 2. Constraint Alignment / 约束对齐

输出应符合输入中已声明的边界、风格、格式与目标。

### 3. Generative Trace / 生成痕迹

如涉及补全、推断、扩展、创意性构造，应允许后续识别哪些部分属于生成而非来源复现。

### 4. Handover Readiness / 可交接性

输出应足以交给：
- M06 做优劣评估
- M12 做真实性/符合性核验
- M07 做结果综合
- M03 做对外表达处理

### 5. Non-Falsified Confidence / 非伪确定性

当内容依赖推测、补全或假设时，应避免以绝对确定口吻伪装其状态。

### 6. Visual Anchor / 视觉锚点

当构成任务涉及视觉产出（UI、布局、设计方案、界面规范等）时，输出必须区分两种产出类型并同时提供：

- **Numeric Specification / 数值规范**：尺寸、间距、颜色值、字号、比例等可量化参数
- **Visual Anchor / 视觉锚点**：ASCII mockup、布局骨架图、线框示意或等价的空间关系表达

仅提供数值规范而不附带视觉锚点是**不可接受的**——下游实现者无法仅凭数值还原设计意图的空间关系与层次结构。
视觉锚点不要求精确像素还原，但必须足以表达：元素相对位置、层级关系、主要比例与留白意图。

若构成任务不涉及视觉产出，本条不适用。

### 7. Visual Character Protocol / 视觉字符协议

> 来源 / Source inspiration：借鉴自 ljg-skills 视觉协议字符约束（`ljg-rank` 与 `ljg-skill-map` 的 ASCII 字符白名单 + Unicode→ASCII 替换对照）。
> Source inspiration: Borrowed from ljg-skills visual protocol character constraints (ASCII whitelist + Unicode→ASCII replacement table from `ljg-rank` and `ljg-skill-map`).

M09 构成的输出**必须**遵守视觉字符白名单——所有视觉装饰、ASCII mockup、结构图、列表标记、状态符号都应在以下白名单内选用。该协议保证跨平台（markdown / PDF / terminal）字符等宽与可视一致性。

| 类别 / Category | 允许字符 / Allowed Characters | 用途 / Purpose |
|---|---|---|
| 树形结构 / Tree Structure | `│ ├ └ ─` | 层级关系、目录树、引用链 |
| 状态符号 / Status Symbols | `⛔ ✅ ❌ ⚠️ 🔄 ⏸️ 🌟 🤔 🚫 📋 🎯 📦 📊 📁` | 通过/失败、警告、关键标记、领域分类 |
| 列表标记 / List Markers | `• ◦ ▸` | 项目列表、嵌套项、引导标记 |
| Markdown 原生 / Native Markdown | `# * - _ \\` | ` >` 等 | 标题、强调、引用、代码块（不属本协议约束范围） |

**禁止类别 / Disallowed Categories**：
- 超出上述常用 emoji 集的特殊符号（如装饰性 Unicode 表情、地区/文化特定符号）
- 装饰性 Unicode 符号（如 `❀ ✿ ❄ ☆ ※ ◆ ◇` 等审美字符）
- 过度审美字符（如全角花体、艺术字符变体、特殊填充字符）

**例外声明 / Exception Declaration**：
若构成任务的领域要求使用白名单外字符（如展示 Unicode 字符集本身、特定排版协议、字符编码示例），**必须**在产出中显式声明使用了哪些超出白名单的字符及其理由。无显式声明而使用超白名单字符 → M12 核验时按 Constraint Drift 处理。

**等价替换建议 / Equivalent Substitution**：当存在白名单等价表达时，**必须**优先使用白名单字符；如箭头优先用 `->` 或 `→`（在 emoji 集内）而非 `⇒ ➔ ➜`；分隔优先用 `─` 或 `-` 而非 `═ ▬`。

