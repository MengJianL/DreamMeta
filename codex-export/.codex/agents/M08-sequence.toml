| 维度 / Dimension | 本原子产出何种经验 / What Lesson | 回写位置 / Writeback Target |
|---|---|---|
| **模式 / Pattern** | 编排模式（如批次大小、汇合点、阶段切分、注意力成本范式） | `memory/patterns/` |
| **伤疤 / Scar** | 编排冲突、注意力超载等系统性失败 | `memory/scars/`（项目级） + `~/.claude/scars/`（全局级，用户确认） |
| **能力缺口 / Capability Gap** | 长链路编排盲区（即长依赖任务结构超出现有阶段切分启发） | `memory/capability-gaps.md` |
| **路由经验 / Routing Lesson** | 串并行决策错误——并行候选实际存在隐含依赖、串行候选实际可并发的判定教训 | `memory/capability-gaps.md` 或本原子 Failure Modes section |

